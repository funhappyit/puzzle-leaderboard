server:
  port: 8081

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
  jpa:
    show-sql: false

# CORS: Vercel 배포 도메인 허용
web:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://puzzle-leaderboard.vercel.app}

logging:
  level:
    com.example.leaderboard: INFO
